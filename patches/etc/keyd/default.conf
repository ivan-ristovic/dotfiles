[ids]
*

[main]
# Lenovo Assistant/Copilot key on many IdeaPad/Slim models emits this chord.
# Map it back to the missing physical right Ctrl key.
leftshift+leftmeta+f23 = rightcontrol
rightcontrol = rightcontrol

# Caps Lock is Escape when tapped and the i3 modifier when held.
# Physical left Meta is also the i3 modifier.
capslock = overload(meta, esc)
leftmeta = leftmeta

# Physical right Meta emits the compose/menu key. XKB maps that to Compose.
rightmeta = compose
