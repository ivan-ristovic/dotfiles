# instance=/home
# command=$SCRIPT_DIR/disk
# interval=60
# ALERT_LOW=5

# Memory usage
# The type defaults to "mem" if the instance is not specified.
[memory]
label=п‚® 
command=$SCRIPT_DIR/memory
# min_width=RAM: 100.00%
interval=2

[cpu_usage]
LABEL_1=у°ѕ†  
LABEL_2=у°“…  
command=$SCRIPT_DIR/cpu
# min_width=CPU: 100.00%
interval=2

[cpu_temp]
label=
command=$SCRIPT_DIR/sensor
interval=2
T_WARN=70
T_CRIT=90
SENSOR=k10temp-pci-00c3
METRIC=Tctl
UNIT=В°C

[gpu_temp]
label=
command=$SCRIPT_DIR/sensor
interval=2
T_WARN=70
T_CRIT=90
SENSOR=amdgpu-pci-0400
METRIC=edge
UNIT=В°C

